name: 'Publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact_name: 'bundle-macos-aarch64'
            artifact_path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**/*'

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            artifact_name: 'bundle-macos-x64'
            artifact_path: 'src-tauri/target/x86_64-apple-darwin/release/bundle/**/*'

          - platform: 'ubuntu-24.04'
            args: ''
            artifact_name: 'bundle-linux-x64'
            artifact_path: 'src-tauri/target/release/bundle/**/*'

          - platform: 'ubuntu-24.04-arm'
            args: ''
            artifact_name: 'bundle-linux-arm64'
            artifact_path: 'src-tauri/target/release/bundle/**/*'

          - platform: 'windows-latest'
            args: ''
            artifact_name: 'bundle-windows-x64'
            artifact_path: 'src-tauri/target/release/bundle/**/*'

          - platform: 'windows-11-arm'
            args: ''
            artifact_name: 'bundle-windows-arm64'
            artifact_path: 'src-tauri/target/release/bundle/**/*'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-11-arm' && 'aarch64-pc-windows-msvc' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install cargo-about
        uses: taiki-e/install-action@0fde6d128a3d980ceac30be8c8b8739abd963b81 # v2
        with:
          tool: cargo-about

      # TEMPORARY WORKAROUND:
      # Use a custom tauri-cli branch to enable the new "truly portable" AppImage format.
      - name: Override tauri-cli (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        shell: bash
        run: |
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --locked --force
          echo "TAURI_BUNDLER_NEW_APPIMAGE_FORMAT=true" >> $GITHUB_ENV

      - name: Install tauri-cli
        if: matrix.platform != 'ubuntu-24.04' && matrix.platform != 'ubuntu-24.04-arm'
        shell: bash
        run: |
          cargo install tauri-cli

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
        run: |
          cargo tauri build ${{ matrix.args }}

      - name: Upload app bundles immediately
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn

      - name: Create public PDBs (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $kitsRoot = "${Env:ProgramFiles(x86)}\Windows Kits\10"
          if (-not (Test-Path $kitsRoot)) {
            Write-Error "Windows 10 Kits folder not found at $kitsRoot"
          }

          $arch = if ($env:RUNNER_ARCH -eq 'ARM64') { 'arm64' } else { 'x64' }
          $pdbcopy = Get-ChildItem -Path $kitsRoot -Recurse -Filter "pdbcopy.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\$arch\\pdbcopy\.exe$" } |
            Select-Object -First 1

          if (-not $pdbcopy -and $env:RUNNER_ARCH -eq 'ARM64') {
            $pdbcopy = Get-ChildItem -Path $kitsRoot -Recurse -Filter "pdbcopy.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\x64\\pdbcopy\.exe$" } |
              Select-Object -First 1
          }

          if (-not $pdbcopy) {
            Write-Error "pdbcopy.exe not found under $kitsRoot"
          }

          $pdbs = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.pdb"
          if (-not $pdbs) {
            Write-Host "No PDB files found under src-tauri/target/release"
            exit 0
          }

          $publicDir = "src-tauri/target/release/public-pdb"
          New-Item -ItemType Directory -Path $publicDir -Force | Out-Null

          foreach ($pdb in $pdbs) {
            $outPath = Join-Path $publicDir $pdb.Name
            & "$($pdbcopy.FullName)" "$($pdb.FullName)" "$outPath" -p
          }

      - name: Fetch tool binaries for MSIX layout (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        run: npm run manifest:fetch

      - name: Bundle Portable Version (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $layoutRoot = "portable-layout"
          $portableFolder = "ovd-portable"

          $pkg = Get-Content -Raw "package.json" | ConvertFrom-Json
          $version = $pkg.version

          $arch = if ($env:RUNNER_ARCH -eq 'ARM64') { 'arm64' } else { 'x64' }

          $zipName = "Open.Video.Downloader_$($version)_$($arch)-portable.zip"
          $exeName = "Open.Video.Downloader_$($version)_$($arch).exe"
          $keepFileName = ".keep"

          Write-Host "Building portable bundle for $arch architecture: $zipName"

          $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" | Where-Object { $_.Name -notmatch "setup" } | Select-Object -First 1
          if (-not $exe) { Write-Error "Could not find main exe in $releaseDir" }

          New-Item -ItemType Directory -Path "$layoutRoot/$portableFolder" -Force | Out-Null
          New-Item -ItemType File -Path "$layoutRoot/$portableFolder/$keepFileName" -Value "Do not remove this file or directory." -Force | Out-Null
          Copy-Item $exe.FullName -Destination "$layoutRoot/$exeName" -Force

          Compress-Archive -Path "$layoutRoot/*" -DestinationPath $zipName -Force

      - name: Upload Portable ZIP (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: portable-${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
          path: Open.Video.Downloader_*_*-portable.zip
          if-no-files-found: warn

      - name: Upload PDB symbols (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ovd-pdb-${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
          path: src-tauri/target/release/public-pdb/*.pdb
          if-no-files-found: warn
